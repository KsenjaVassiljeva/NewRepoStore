<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to the Simple Website</h1>
        <div id="user-button"></div>
    </header>
    <main>
        <div id="sign-in-button"></div>
        <div id="user-info" style="display:none;">
            <h2>Welcome, <span id="user-name"></span>!</h2>
        </div>
    </main>

    <script async crossorigin="anonymous" src="https://cdn.clerk.com/clerk.js"></script>
    <script>
        window.addEventListener('load', async function () {
            const { Clerk } = window;
            
            await Clerk.load({
                publishableKey: 'YOUR_CLERK_PUBLISHABLE_KEY_HERE'
            });

            if (Clerk.user) {
                document.getElementById('user-info').style.display = 'block';
                document.getElementById('user-name').textContent = Clerk.user.firstName;
                document.getElementById('sign-in-button').style.display = 'none';
            } else {
                Clerk.mountSignIn(document.getElementById('sign-in-button'));
            }

            Clerk.mountUserButton(document.getElementById('user-button'));
        });
    </script>
</body>
</html>
